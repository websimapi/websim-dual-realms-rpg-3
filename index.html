<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dual Realms RPG</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- UI Overlay -->
    <div id="ui-layer">
        <div id="minimap-container">
            <canvas id="minimap"></canvas>
        </div>

        <div id="stat-bars">
            <div class="bar-container health"><div class="bar-fill" id="hp-bar" style="width: 100%"></div></div>
            <div class="bar-container energy"><div class="bar-fill" id="xp-bar" style="width: 0%"></div></div>
        </div>

        <div id="notifications"></div>

        <div id="action-bar">
            <button id="btn-inventory" class="ui-btn">🎒 Inv</button>
            <button id="btn-skills" class="ui-btn">⚔️ Skills</button>
            <button id="btn-save" class="ui-btn">💾 Save</button>
        </div>

        <!-- Windows -->
        <div id="window-skills" class="window hidden">
            <div class="window-header">
                <span>Skill Pairs</span>
                <button class="close-btn">X</button>
            </div>
            <div class="window-content" id="skills-list">
                <!-- Skills populated by JS -->
            </div>
        </div>

        <div id="window-inventory" class="window hidden">
            <div class="window-header">
                <span>Inventory</span>
                <button class="close-btn">X</button>
            </div>
            <div class="window-content" id="inventory-grid">
                <!-- Items populated by JS -->
            </div>
        </div>
        
        <div id="chat-box">
            <div id="chat-history">
                <div class="chat-msg system">Welcome to Dual Realms.</div>
            </div>
            <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off">
        </div>

        <div id="context-menu" class="hidden"></div>
    </div>

    <script type="module" src="./src/main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
